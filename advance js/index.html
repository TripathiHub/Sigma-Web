<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btn{
             cursor: pointer;
             height: 30px;
             width: 50vw;
             border-radius: 20px;
             background-color: #6eca89;
             border: 1px solid rgb(239, 96, 96);
        }
        .container{
            display: flex;
            height: 50vh;
            width: 50vw;
            background-color: #8797e4;
            justify-content: center;
            align-items: center;
        }
        .box{
            margin: 10px;
            height: 40px;
            width: 150px;
            background-color: #6eca89;
            justify-content: center;
            align-items: center;
            align-content: center;
            text-align: center;
            border-radius: 20px;
            border: 3px solid rgb(239, 96, 96);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="btn">Click here to change background of body....</button>
    <div class="container">
        <div class="but1 box">Click here</div>
        <div class="but2 box">click here</div>
        <div class="but3 box">click here</div>
        <div class="but4 box" tabindex="0">click here</div>
    </div>
    <script src="index.js"></script>
</body>
</html>
